<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约会邀请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#FFF8F5 0%,#FFEDE8 50%,#FFEBF2 100%);
  min-height:100vh;min-height:100dvh;color:#3D2C35;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;text-align:center;overflow:hidden;
}

.hero{
  width:100%;max-width:340px;margin:0 auto 30px;
  display:flex;align-items:center;justify-content:center;
}
.hero svg{width:100%;max-width:300px;height:auto}

.english-label{
  font-size:11px;color:#B098A3;letter-spacing:.18em;margin-bottom:14px;
  text-transform:uppercase;font-weight:600;
}
.chinese-title{
  font-size:32px;font-weight:800;color:#3D2C35;line-height:1.3;
  margin-bottom:8px;
}
.chinese-sub{
  font-size:15px;color:#9B8893;letter-spacing:.04em;margin-bottom:40px;
  font-weight:500;
}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:16px 52px;border-radius:30px;
  background:linear-gradient(135deg,#E89BB8,#E0709F);
  color:#fff;font-size:16px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;text-decoration:none;border:none;
  box-shadow:0 6px 20px rgba(224,112,159,.3);
  transition:all .3s;font-family:inherit;
}
.btn:active{transform:scale(.96)}
.btn:hover{box-shadow:0 8px 24px rgba(224,112,159,.4)}

.footer-text{margin-top:30px;font-size:12px;color:#B098A3;letter-spacing:.06em}

.decor-icons{position:absolute;pointer-events:none;z-index:0;font-size:16px}
.decor-icons span{position:absolute;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

@keyframes riseIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:riseIn .8s ease forwards;opacity:0}
.anim.d1{animation-delay:.1s}.anim.d2{animation-delay:.3s}.anim.d3{animation-delay:.5s}
</style>
</head>
<body>

<div class="decor-icons" style="width:100%;height:100%;top:0;left:0;position:absolute">
  <span style="top:10%;left:8%;color:#FFD700">✦</span>
  <span style="top:18%;right:10%;color:#E0709F">♥</span>
  <span style="bottom:25%;left:6%;color:#FFA0C0">✧</span>
  <span style="top:50%;right:6%;color:#FFD700">✦</span>
  <span style="bottom:15%;right:12%;color:#E89BB8">♥</span>
</div>

<div class="hero anim d1">
  <svg viewBox="0 0 300 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 左边女孩 -->
    <g>
      <!-- 头发 -->
      <ellipse cx="100" cy="60" rx="35" ry="38" fill="#8B6914"/>
      <ellipse cx="92" cy="55" rx="24" ry="30" fill="#A0782C"/>
      <!-- 刘海 -->
      <ellipse cx="100" cy="42" rx="26" ry="14" fill="#6B4F10"/>
      <!-- 脸 -->
      <ellipse cx="100" cy="64" rx="20" ry="22" fill="#FFE4C4" stroke="#3D2C35" stroke-width="1.5" stroke-dasharray="3,2"/>
      <!-- 腮红 -->
      <ellipse cx="89" cy="72" rx="6" ry="3" fill="#FFB3B3" opacity="0.6"/>
      <ellipse cx="111" cy="72" rx="6" ry="3" fill="#FFB3B3" opacity="0.6"/>
      <!-- 眼睛 -->
      <circle cx="92" cy="63" r="2.5" fill="#3D2C35"/>
      <circle cx="108" cy="63" r="2.5" fill="#3D2C35"/>
      <circle cx="92.5" cy="62" r="0.8" fill="white"/>
      <circle cx="108.5" cy="62" r="0.8" fill="white"/>
      <!-- 微笑 -->
      <path d="M95 72 Q100 76 105 72" stroke="#3D2C35" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- 身体 - 连衣裙 -->
      <path d="M78 86 Q76 100 73 145 L127 145 Q124 100 122 86 Z" fill="#E8734A" stroke="#3D2C35" stroke-width="1.5" stroke-dasharray="3,2"/>
      <!-- 领口 -->
      <path d="M88 86 Q100 96 112 86" fill="none" stroke="#3D2C35" stroke-width="1.2" stroke-dasharray="2,2"/>
      <!-- 左臂 - 伸向中间 -->
      <path d="M80 92 Q60 100 55 115 Q50 130 65 145" stroke="#FFE4C4" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M80 92 Q60 100 55 115 Q50 130 65 145" stroke="#3D2C35" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
      <!-- 右臂 -->
      <path d="M120 92 Q135 110 130 138" stroke="#FFE4C4" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M120 92 Q135 110 130 138" stroke="#3D2C35" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
      <!-- 腿 -->
      <line x1="88" y1="145" x2="84" y2="180" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>
      <line x1="112" y1="145" x2="116" y2="180" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>
      <!-- 鞋子 -->
      <ellipse cx="80" cy="183" rx="10" ry="5" fill="#3D2C35"/>
      <ellipse cx="120" cy="183" rx="10" ry="5" fill="#3D2C35"/>
      <!-- 发饰 -->
      <circle cx="78" cy="50" r="5" fill="#FF6B88"/>
      <circle cx="79" cy="48" r="2" fill="#FFB3C8"/>
    </g>
    
    <!-- 右边女孩 -->
    <g>
      <ellipse cx="200" cy="60" rx="35" ry="38" fill="#3D2C35"/>
      <ellipse cx="208" cy="55" rx="24" ry="30" fill="#2D2D2D"/>
      <!-- 长发 -->
      <rect x="170" y="55" width="18" height="38" rx="9" fill="#2D2D2D"/>
      <rect x="212" y="55" width="18" height="38" rx="9" fill="#2D2D2D"/>
      <!-- 刘海 -->
      <ellipse cx="200" cy="42" rx="26" ry="14" fill="#1A1A1A"/>
      <!-- 脸 -->
      <ellipse cx="200" cy="64" rx="20" ry="22" fill="#FFE4C4" stroke="#3D2C35" stroke-width="1.5" stroke-dasharray="3,2"/>
      <ellipse cx="189" cy="72" rx="6" ry="3" fill="#FFB3B3" opacity="0.6"/>
      <ellipse cx="211" cy="72" rx="6" ry="3" fill="#FFB3B3" opacity="0.6"/>
      <circle cx="192" cy="63" r="2.5" fill="#3D2C35"/>
      <circle cx="208" cy="63" r="2.5" fill="#3D2C35"/>
      <circle cx="192.5" cy="62" r="0.8" fill="white"/>
      <circle cx="208.5" cy="62" r="0.8" fill="white"/>
      <path d="M195 72 Q200 76 205 72" stroke="#3D2C35" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- 身体 - 卫衣 -->
      <path d="M178 86 Q176 100 173 145 L227 145 Q224 100 222 86 Z" fill="#5B8C5A" stroke="#3D2C35" stroke-width="1.5" stroke-dasharray="3,2"/>
      <path d="M188 86 Q200 96 212 86" fill="none" stroke="#3D2C35" stroke-width="1.2" stroke-dasharray="2,2"/>
      <!-- 右臂 -->
      <path d="M220 92 Q240 100 245 115 Q250 130 235 145" stroke="#FFE4C4" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M220 92 Q240 100 245 115 Q250 130 235 145" stroke="#3D2C35" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
      <!-- 左臂 -->
      <path d="M180 92 Q165 110 170 138" stroke="#FFE4C4" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M180 92 Q165 110 170 138" stroke="#3D2C35" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
      <line x1="188" y1="145" x2="184" y2="180" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>
      <line x1="212" y1="145" x2="216" y2="180" stroke="#FFE4C4" stroke-width="8" stroke-linecap="round"/>
      <ellipse cx="180" cy="183" rx="10" ry="5" fill="#3D2C35"/>
      <ellipse cx="220" cy="183" rx="10" ry="5" fill="#3D2C35"/>
    </g>
    
    <!-- 中间爱心 -->
    <g>
      <path d="M140 130 Q145 120 152 124 Q159 120 160 130 Q160 140 150 152 Q140 140 140 130 Z" fill="#E0709F" stroke="#3D2C35" stroke-width="1.5"/>
      <circle cx="146" cy="132" r="2" fill="white" opacity="0.6"/>
    </g>
    
    <!-- 地面 -->
    <ellipse cx="150" cy="200" rx="80" ry="6" fill="#E5C8D0" opacity="0.4"/>
  </svg>
</div>

<div class="english-label anim d2">BE MY DATE?</div>
<h1 class="chinese-title anim d2">约会邀请</h1>
<p class="chinese-sub anim d2">为特别的人，准备一份心意</p>

<a class="btn anim d3" href="create.html">开始制作 →</a>
<p class="footer-text anim d3">一段小邀请，一次甜甜的见面 💖</p>

</body>
</html>
