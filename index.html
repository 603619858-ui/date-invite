<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约会邀请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#FAF7F2;color:#1A1A1A;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
}
.line{width:1px;height:60px;background:#1A1A1A;margin-bottom:40px;opacity:0.4}
h1{font-size:28px;font-weight:300;letter-spacing:.08em;margin-bottom:16px}
.subtitle{font-size:14px;color:#8B7E74;letter-spacing:.06em;margin-bottom:48px;font-weight:300}
.btn{
  display:inline-block;padding:14px 40px;border:1px solid #1A1A1A;
  background:transparent;color:#1A1A1A;font-size:15px;letter-spacing:.08em;
  cursor:pointer;text-decoration:none;transition:all .3s;font-family:inherit;
}
.btn:active{transform:scale(.97)}
.footer-text{margin-top:60px;font-size:11px;color:#8B7E74;letter-spacing:.04em}
</style>
</head>
<body>
<div class="line"></div>
<h1>约会邀请</h1>
<p class="subtitle">DIGITAL INVITATION</p>
<a class="btn" href="create.html">创建邀请</a>
<p class="footer-text">为特别的人，制作一份特别的邀请</p>
</body>
</html>
