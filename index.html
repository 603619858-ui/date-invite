<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 约会邀请</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#FFF0F5 0%,#FFE4E1 30%,#FFF5EE 60%,#FFE4F0 100%);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
  position:relative;overflow:hidden;
}

/* 浮动装饰 */
body::before{
  content:'🌸';
  position:absolute;top:10%;left:8%;font-size:28px;
  animation:float 3s ease-in-out infinite;opacity:.6;
}
body::after{
  content:'💫';
  position:absolute;top:15%;right:10%;font-size:24px;
  animation:float 3.5s ease-in-out .5s infinite;opacity:.5;
}
.floating{position:absolute;pointer-events:none;z-index:0}
.floating:nth-child(1){top:20%;left:5%;font-size:20px;animation:float 4s ease-in-out 1s infinite}
.floating:nth-child(2){top:25%;right:8%;font-size:18px;animation:float 3.8s ease-in-out .3s infinite}
.floating:nth-child(3){top:70%;left:10%;font-size:22px;animation:float 4.2s ease-in-out .7s infinite}
.floating:nth-child(4){top:75%;right:6%;font-size:16px;animation:float 3.3s ease-in-out 1.2s infinite}
.floating:nth-child(5){top:50%;left:3%;font-size:14px;animation:float 3.6s ease-in-out .9s infinite}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-15px) rotate(5deg)}
}

@keyframes heartBeat{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.15)}
  30%{transform:scale(1)}
  45%{transform:scale(1.1)}
  60%{transform:scale(1)}
}

.container{position:relative;z-index:1}

.heart-icon{font-size:48px;margin-bottom:24px;animation:heartBeat 1.5s ease infinite;display:inline-block}

h1{
  font-family:'ZCOOL KuaiLe',"PingFang SC",cursive;
  font-size:32px;color:#FF6B88;margin-bottom:8px;
  text-shadow:0 2px 8px rgba(255,107,136,.2);
  letter-spacing:.04em;
}
.subtitle{
  font-size:14px;color:#F0A0B0;letter-spacing:.08em;margin-bottom:12px;font-weight:500;
}
.deco-line{
  width:60px;height:2px;background:linear-gradient(90deg,transparent,#FFB6C1,transparent);
  margin:0 auto 36px;
}

.btn{
  display:inline-block;padding:16px 48px;
  background:linear-gradient(135deg,#FF8FAB,#FF6B88);
  color:#fff;font-size:17px;letter-spacing:.06em;
  cursor:pointer;text-decoration:none;
  border-radius:50px;font-weight:600;
  box-shadow:0 6px 20px rgba(255,107,136,.35);
  transition:all .3s;font-family:inherit;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent,rgba(255,255,255,.3),transparent);
  transform:rotate(45deg);transition:all .5s;
}
.btn:active{transform:scale(.95);box-shadow:0 3px 12px rgba(255,107,136,.3)}
.btn:hover{box-shadow:0 8px 28px rgba(255,107,136,.45)}

.footer-text{margin-top:40px;font-size:12px;color:#E8A0B0;letter-spacing:.06em}

/* 星星装饰 */
.stars{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:0}
.star{position:absolute;color:#FFD700;font-size:12px;animation:twinkle 2s ease-in-out infinite}
.star:nth-child(1){top:8%;left:15%;animation-delay:0s}
.star:nth-child(2){top:12%;right:20%;animation-delay:.5s}
.star:nth-child(3){top:30%;left:25%;animation-delay:1s}
.star:nth-child(4){top:45%;right:15%;animation-delay:1.5s}
.star:nth-child(5){top:60%;left:20%;animation-delay:.3s}
.star:nth-child(6){top:80%;right:25%;animation-delay:.8s}
.star:nth-child(7){top:88%;left:12%;animation-delay:1.3s}
.star:nth-child(8){top:5%;left:50%;animation-delay:1.8s}
@keyframes twinkle{
  0%,100%{opacity:.3;transform:scale(.8)}
  50%{opacity:1;transform:scale(1.2)}
}
</style>
</head>
<body>
<div class="stars">
  <span class="star">✦</span><span class="star">✧</span><span class="star">✦</span><span class="star">✧</span>
  <span class="star">✦</span><span class="star">✧</span><span class="star">✦</span><span class="star">✧</span>
</div>
<div class="floating">💕</div><div class="floating">🎀</div><div class="floating">💝</div><div class="floating">✨</div><div class="floating">🩷</div>

<div class="container">
  <div class="heart-icon">💖</div>
  <h1>约会邀请</h1>
  <p class="subtitle">♡ SWEET INVITATION ♡</p>
  <div class="deco-line"></div>
  <a class="btn" href="create.html">💗 创建邀请</a>
  <p class="footer-text">为特别的人，制作一份甜甜的邀请 ٩(◕‿◕)۶</p>
</div>
</body>
</html>
