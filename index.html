<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约会邀请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#FFF8F5 0%,#FFEDE8 50%,#FFEBF2 100%);
  min-height:100vh;min-height:100dvh;color:#3D2C35;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;text-align:center;overflow:hidden;
}

/* 装饰小图标 */
.decor-icons{position:absolute;pointer-events:none;z-index:0;font-size:16px}
.decor-icons span{position:absolute;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

@keyframes riseIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:riseIn .8s ease forwards;opacity:0}
.anim.d1{animation-delay:.1s}.anim.d2{animation-delay:.3s}.anim.d3{animation-delay:.5s}

.chinese-title{
  font-size:28px;font-weight:800;color:#3D2C35;line-height:1.4;
  margin-bottom:8px;letter-spacing:.01em;
}
.chinese-title .pink{color:#E0709F}
.chinese-sub{
  font-size:14px;color:#9B8893;letter-spacing:.04em;margin-bottom:32px;
  font-weight:500;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:16px 52px;border-radius:30px;
  font-size:16px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;text-decoration:none;border:none;
  transition:all .3s;font-family:inherit;
}
.btn:active{transform:scale(.96)}
.btn-accept{
  background:linear-gradient(135deg,#E89BB8,#E0709F);
  color:#fff;box-shadow:0 6px 20px rgba(224,112,159,.3);
}
.btn-accept:hover{box-shadow:0 8px 24px rgba(224,112,159,.4)}
</style>
</head>
<body>

<div class="decor-icons" style="width:100%;height:100%;top:0;left:0;position:absolute">
  <span style="top:8%;left:6%;color:#FFD700;font-size:14px">✦</span>
  <span style="top:12%;right:8%;color:#E0709F;font-size:12px">♥</span>
  <span style="bottom:20%;left:5%;color:#FFA0C0;font-size:10px">✧</span>
  <span style="bottom:25%;right:7%;color:#FFD700;font-size:11px">✦</span>
</div>

<!-- 像素风信封 -->
<div class="anim d1" style="margin-bottom:32px">
  <svg viewBox="0 0 220 200" width="200" height="180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 信封底层（米色） -->
    <rect x="20" y="60" width="180" height="120" fill="#FFF0DC" stroke="#3D2C35" stroke-width="2"/>
    <!-- 信封上层（粉色边） -->
    <rect x="20" y="60" width="180" height="120" fill="none" stroke="#E0709F" stroke-width="3"/>
    <!-- 像素台阶效果（左侧） -->
    <g fill="#FFB6C8" stroke="#3D2C35" stroke-width="1.5">
      <rect x="22" y="62" width="10" height="10"/>
      <rect x="32" y="62" width="10" height="10"/>
      <rect x="22" y="72" width="10" height="10"/>
    </g>
    <!-- 像素台阶效果（右侧） -->
    <g fill="#FFB6C8" stroke="#3D2C35" stroke-width="1.5">
      <rect x="188" y="62" width="10" height="10"/>
      <rect x="178" y="62" width="10" height="10"/>
      <rect x="188" y="72" width="10" height="10"/>
    </g>
    <!-- 信封内层（米黄） -->
    <rect x="40" y="80" width="140" height="100" fill="#FFE8C8" stroke="#3D2C35" stroke-width="1.5"/>
    <!-- 像素爱心（中间） -->
    <g transform="translate(70, 95)" fill="#FF6B88" stroke="#3D2C35" stroke-width="1.5">
      <rect x="0" y="10" width="10" height="10"/>
      <rect x="10" y="0" width="10" height="10"/>
      <rect x="20" y="0" width="10" height="10"/>
      <rect x="30" y="0" width="10" height="10"/>
      <rect x="40" y="10" width="10" height="10"/>
      <rect x="0" y="20" width="10" height="10"/>
      <rect x="10" y="10" width="10" height="10" fill="#FF8FAB"/>
      <rect x="20" y="10" width="10" height="10" fill="#FF8FAB"/>
      <rect x="30" y="10" width="10" height="10" fill="#FF8FAB"/>
      <rect x="40" y="20" width="10" height="10"/>
      <rect x="0" y="30" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10" fill="#FF8FAB"/>
      <rect x="20" y="20" width="10" height="10" fill="#FFB3C8"/>
      <rect x="30" y="20" width="10" height="10" fill="#FF8FAB"/>
      <rect x="40" y="30" width="10" height="10"/>
      <rect x="0" y="40" width="10" height="10"/>
      <rect x="10" y="30" width="10" height="10"/>
      <rect x="20" y="30" width="10" height="10"/>
      <rect x="30" y="30" width="10" height="10"/>
      <rect x="40" y="40" width="10" height="10"/>
      <rect x="10" y="40" width="10" height="10"/>
      <rect x="20" y="40" width="10" height="10"/>
      <rect x="30" y="40" width="10" height="10"/>
    </g>
    <!-- 高光 -->
    <rect x="40" y="80" width="20" height="6" fill="#FFF8E8" opacity="0.6"/>
  </svg>
</div>

<div class="chinese-title anim d2">想约你吃顿好吃的<br>准备了一个小<span class="pink"> Moment</span></div>
<p class="chinese-sub anim d2">请收下这份约饭邀请</p>

<a class="btn btn-accept anim d3" href="create.html">轻触打开 →</a>

</body>
</html>
