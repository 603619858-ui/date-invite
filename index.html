<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约会邀请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#FFF8F5 0%,#FFEDE8 50%,#FFEBF2 100%);
  min-height:100vh;min-height:100dvh;color:#3D2C35;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;text-align:center;overflow:hidden;
}

/* 装饰小图标 */
.decor-icons{position:absolute;pointer-events:none;z-index:0;font-size:16px}
.decor-icons span{position:absolute;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

@keyframes riseIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:riseIn .8s ease forwards;opacity:0}
.anim.d1{animation-delay:.1s}.anim.d2{animation-delay:.3s}.anim.d3{animation-delay:.5s}

.chinese-title{
  font-size:28px;font-weight:800;color:#3D2C35;line-height:1.4;
  margin-bottom:8px;letter-spacing:.01em;
}
.chinese-title .pink{color:#E0709F}
.chinese-sub{
  font-size:14px;color:#9B8893;letter-spacing:.04em;margin-bottom:32px;
  font-weight:500;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:16px 52px;border-radius:30px;
  font-size:16px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;text-decoration:none;border:none;
  transition:all .3s;font-family:inherit;
}
.btn:active{transform:scale(.96)}
.btn-accept{
  background:linear-gradient(135deg,#E89BB8,#E0709F);
  color:#fff;box-shadow:0 6px 20px rgba(224,112,159,.3);
}
.btn-accept:hover{box-shadow:0 8px 24px rgba(224,112,159,.4)}
</style>
</head>
<body>

<div class="decor-icons" style="width:100%;height:100%;top:0;left:0;position:absolute">
  <span style="top:8%;left:6%;color:#FFD700;font-size:14px">✦</span>
  <span style="top:12%;right:8%;color:#E0709F;font-size:12px">♥</span>
  <span style="bottom:20%;left:5%;color:#FFA0C0;font-size:10px">✧</span>
  <span style="bottom:25%;right:7%;color:#FFD700;font-size:11px">✦</span>
</div>

<!-- 像素风双女孩手拉手 -->
<div class="anim d1" style="margin-bottom:32px">

    <!-- ===== 左边女孩（棕发红衣） ===== -->
    <!-- 头发（顶部） -->
    <g fill="#8B6914" stroke="#3D2C35" stroke-width="1">
      <rect x="40" y="20" width="10" height="10"/><rect x="50" y="20" width="10" height="10"/><rect x="60" y="20" width="10" height="10"/><rect x="70" y="20" width="10" height="10"/>
      <rect x="30" y="30" width="10" height="10"/><rect x="40" y="30" width="10" height="10"/><rect x="50" y="30" width="10" height="10"/><rect x="60" y="30" width="10" height="10"/><rect x="70" y="30" width="10" height="10"/><rect x="80" y="30" width="10" height="10"/>
      <rect x="30" y="40" width="10" height="10"/><rect x="80" y="40" width="10" height="10"/>
      <!-- 两侧头发垂落 -->
      <rect x="30" y="50" width="10" height="10"/><rect x="80" y="50" width="10" height="10"/>
      <rect x="30" y="60" width="10" height="10"/><rect x="80" y="60" width="10" height="10"/>

    <!-- 刘海 -->

    </g>
    <!-- 脸 -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="40" y="40" width="10" height="10"/><rect x="50" y="40" width="10" height="10"/><rect x="60" y="40" width="10" height="10"/><rect x="70" y="40" width="10" height="10"/>
      <rect x="40" y="50" width="10" height="10"/><rect x="50" y="50" width="10" height="10"/><rect x="60" y="50" width="10" height="10"/><rect x="70" y="50" width="10" height="10"/>
    </g>
    <!-- 眼睛 -->
    <g fill="#3D2C35">
      <rect x="46" y="46" width="4" height="4"/><rect x="66" y="46" width="4" height="4"/>
    </g>
    <!-- 腮红 -->
    <g fill="#FFB3B3" opacity="0.6">
      <rect x="40" y="52" width="6" height="3"/><rect x="74" y="52" width="6" height="3"/>
    </g>
    <!-- 嘴 -->
    <rect x="55" y="55" width="10" height="2" fill="#3D2C35"/>
    <!-- 发饰 -->
    <g fill="#FF6B88" stroke="#3D2C35" stroke-width="0.5">

    <!-- 身体（红色连衣裙） -->

      <rect x="30" y="70" width="10" height="10"/><rect x="40" y="70" width="10" height="10"/><rect x="50" y="70" width="10" height="10"/><rect x="60" y="70" width="10" height="10"/><rect x="70" y="70" width="10" height="10"/><rect x="80" y="70" width="10" height="10"/>
      <rect x="30" y="80" width="10" height="10"/><rect x="40" y="80" width="10" height="10"/><rect x="50" y="80" width="10" height="10"/><rect x="60" y="80" width="10" height="10"/><rect x="70" y="80" width="10" height="10"/><rect x="80" y="80" width="10" height="10"/>
      <rect x="30" y="90" width="10" height="10"/><rect x="40" y="90" width="10" height="10"/><rect x="50" y="90" width="10" height="10"/><rect x="60" y="90" width="10" height="10"/><rect x="70" y="90" width="10" height="10"/><rect x="80" y="90" width="10" height="10"/>
      <rect x="30" y="100" width="10" height="10"/><rect x="40" y="100" width="10" height="10"/><rect x="50" y="100" width="10" height="10"/><rect x="60" y="100" width="10" height="10"/><rect x="70" y="100" width="10" height="10"/><rect x="80" y="100" width="10" height="10"/>
      <rect x="30" y="110" width="10" height="10"/><rect x="40" y="110" width="10" height="10"/><rect x="50" y="110" width="10" height="10"/><rect x="60" y="110" width="10" height="10"/><rect x="70" y="110" width="10" height="10"/><rect x="80" y="110" width="10" height="10"/>

    <!-- 领口 -->
    <g fill="#FFE4C4">
      <rect x="50" y="60" width="10" height="4"/><rect x="60" y="60" width="10" height="4"/>

    <!-- 左臂（垂下） -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">

    </g>
    
    <!-- 右臂（伸向中间） -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="90" y="80" width="10" height="10"/><rect x="100" y="80" width="10" height="10"/><rect x="110" y="80" width="10" height="10"/>
    </g>
    
    <!-- 腿 -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="40" y="120" width="10" height="10"/><rect x="40" y="130" width="10" height="10"/><rect x="40" y="140" width="10" height="10"/>
      <rect x="60" y="120" width="10" height="10"/><rect x="60" y="130" width="10" height="10"/><rect x="60" y="140" width="10" height="10"/>
    </g>
    <!-- 鞋子 -->
    <g fill="#3D2C35">
      <rect x="36" y="150" width="14" height="6"/><rect x="58" y="150" width="14" height="6"/>
    </g>
    
    <!-- ===== 右边女孩（黑发绿裙） ===== -->
    <!-- 头发（顶部） -->
    <g fill="#2D2D2D" stroke="#3D2C35" stroke-width="1">
      <rect x="150" y="20" width="10" height="10"/><rect x="160" y="20" width="10" height="10"/><rect x="170" y="20" width="10" height="10"/><rect x="180" y="20" width="10" height="10"/>
      <rect x="140" y="30" width="10" height="10"/><rect x="150" y="30" width="10" height="10"/><rect x="160" y="30" width="10" height="10"/><rect x="170" y="30" width="10" height="10"/><rect x="180" y="30" width="10" height="10"/><rect x="190" y="30" width="10" height="10"/>
      <rect x="140" y="40" width="10" height="10"/><rect x="190" y="40" width="10" height="10"/>
      <!-- 长发两侧垂落 -->
      <rect x="140" y="50" width="10" height="10"/><rect x="190" y="50" width="10" height="10"/>
      <rect x="140" y="60" width="10" height="10"/><rect x="190" y="60" width="10" height="10"/>
    </g>
    <!-- 刘海 -->
    <g fill="#1A1A1A" stroke="#3D2C35" stroke-width="1">
      <rect x="150" y="30" width="10" height="10"/><rect x="160" y="30" width="10" height="10"/><rect x="170" y="30" width="10" height="10"/><rect x="180" y="30" width="10" height="10"/>
    </g>
    <!-- 脸 -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="150" y="40" width="10" height="10"/><rect x="160" y="40" width="10" height="10"/><rect x="170" y="40" width="10" height="10"/><rect x="180" y="40" width="10" height="10"/>
      <rect x="150" y="50" width="10" height="10"/><rect x="160" y="50" width="10" height="10"/><rect x="170" y="50" width="10" height="10"/><rect x="180" y="50" width="10" height="10"/>
    </g>
    <!-- 眼睛 -->
    <g fill="#3D2C35">
      <rect x="156" y="46" width="4" height="4"/><rect x="176" y="46" width="4" height="4"/>
    </g>
    <!-- 腮红 -->
    <g fill="#FFB3B3" opacity="0.6">
      <rect x="150" y="52" width="6" height="3"/><rect x="184" y="52" width="6" height="3"/>
    </g>
    <!-- 嘴 -->
    <rect x="165" y="55" width="10" height="2" fill="#3D2C35"/>
    
    <!-- 身体（绿色卫衣） -->
    <g fill="#5B8C5A" stroke="#3D2C35" stroke-width="1">
      <rect x="150" y="60" width="10" height="10"/><rect x="160" y="60" width="10" height="10"/><rect x="170" y="60" width="10" height="10"/><rect x="180" y="60" width="10" height="10"/>
      <rect x="140" y="70" width="10" height="10"/><rect x="150" y="70" width="10" height="10"/><rect x="160" y="70" width="10" height="10"/><rect x="170" y="70" width="10" height="10"/><rect x="180" y="70" width="10" height="10"/><rect x="190" y="70" width="10" height="10"/>
      <rect x="140" y="80" width="10" height="10"/><rect x="150" y="80" width="10" height="10"/><rect x="160" y="80" width="10" height="10"/><rect x="170" y="80" width="10" height="10"/><rect x="180" y="80" width="10" height="10"/><rect x="190" y="80" width="10" height="10"/>
      <rect x="140" y="90" width="10" height="10"/><rect x="150" y="90" width="10" height="10"/><rect x="160" y="90" width="10" height="10"/><rect x="170" y="90" width="10" height="10"/><rect x="180" y="90" width="10" height="10"/><rect x="190" y="90" width="10" height="10"/>
      <rect x="140" y="100" width="10" height="10"/><rect x="150" y="100" width="10" height="10"/><rect x="160" y="100" width="10" height="10"/><rect x="170" y="100" width="10" height="10"/><rect x="180" y="100" width="10" height="10"/><rect x="190" y="100" width="10" height="10"/>
      <rect x="140" y="110" width="10" height="10"/><rect x="150" y="110" width="10" height="10"/><rect x="160" y="110" width="10" height="10"/><rect x="170" y="110" width="10" height="10"/><rect x="180" y="110" width="10" height="10"/><rect x="190" y="110" width="10" height="10"/>
    </g>
    <!-- 领口 -->
    <g fill="#FFE4C4">
      <rect x="160" y="60" width="10" height="4"/><rect x="170" y="60" width="10" height="4"/>
    </g>
    
    <!-- 左臂（伸向中间） -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="130" y="80" width="10" height="10"/><rect x="120" y="80" width="10" height="10"/>
    </g>
    
    <!-- 右臂（垂下） -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="200" y="80" width="10" height="10"/><rect x="200" y="90" width="10" height="10"/><rect x="200" y="100" width="10" height="10"/>
    </g>
    
    <!-- 腿 -->
    <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
      <rect x="150" y="120" width="10" height="10"/><rect x="150" y="130" width="10" height="10"/><rect x="150" y="140" width="10" height="10"/>
      <rect x="170" y="120" width="10" height="10"/><rect x="170" y="130" width="10" height="10"/><rect x="170" y="140" width="10" height="10"/>
    </g>
    <!-- 鞋子 -->
    <g fill="#3D2C35">
      <rect x="146" y="150" width="14" height="6"/><rect x="168" y="150" width="14" height="6"/>
    </g>
    
    <!-- ===== 中间像素爱心 ===== -->
    <g fill="#FF6B88" stroke="#3D2C35" stroke-width="1">
      <rect x="110" y="85" width="10" height="10"/>
      <rect x="100" y="85" width="10" height="10"/>
      <rect x="100" y="95" width="10" height="10"/>
      <rect x="110" y="95" width="10" height="10" fill="#FF8FAB"/>
      <rect x="120" y="95" width="10" height="10" fill="#FF8FAB"/>
      <rect x="110" y="105" width="10" height="10"/>
    </g>
    
  </svg>
</div>

<div class="chinese-title anim d2">想约你吃顿好吃的<br>准备了一个小<span class="pink"> Moment</span></div>

<a class="btn btn-accept anim d3" href="create.html">轻触打开 →</a>

</body>
</html>
