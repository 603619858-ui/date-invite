<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>选择日期</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#FFFDF9;color:#3D2C35;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:30px 20px 50px;overflow-x:hidden;
}
.container{width:100%;max-width:400px}

/* 双女孩 */
.girls-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:8px;margin-bottom:28px;
}
.girls-row svg{width:130px;height:auto}

.title{
  font-size:26px;font-weight:800;color:#3D2C35;text-align:center;
  line-height:1.3;margin-bottom:6px;
}
.subtitle{font-size:14px;color:#9B8893;text-align:center;margin-bottom:28px}

/* 日历 */
.calendar{
  background:#fff;border-radius:20px;padding:16px;margin-bottom:20px;
  box-shadow:0 2px 16px rgba(0,0,0,.06);
}
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding:0 4px;
}
.cal-month{font-size:17px;font-weight:700;color:#3D2C35}
.cal-nav{
  width:32px;height:32px;border-radius:50%;border:1px solid #E5E0D8;
  background:#fff;cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;color:#9B8893;
  transition:all .2s;font-family:inherit;
}
.cal-nav:active{background:#3D2C35;color:#fff;border-color:#3D2C35}

.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  text-align:center;margin-bottom:8px;
}
.cal-weekdays span{font-size:11px;color:#B098A3;font-weight:600;padding:6px 0}

.cal-days{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;text-align:center;
}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:14px;cursor:pointer;transition:all .2s;
  color:#3D2C35;font-weight:500;border:2px solid transparent;
}
.cal-day:hover{background:#F5F0ED}
.cal-day.empty{cursor:default}
.cal-day.past{color:#D0C8C0;cursor:default;pointer-events:none}
.cal-day.selected{background:#3D2C35;color:#fff;font-weight:700;border-color:#3D2C35}
.cal-day.today{border-color:#E0709F;font-weight:700}
.cal-day.weekend{color:#E0709F}

/* 已选 */
.selected-info{
  background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:20px;
  display:none;align-items:center;gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.selected-info.show{display:flex}
.selected-info .si-emoji{font-size:28px}
.selected-info .si-date{font-size:15px;font-weight:700;color:#3D2C35}
.selected-info .si-week{font-size:12px;color:#9B8893}

.btn{
  display:flex;align-items:center;justify-content:center;width:100%;
  padding:16px;border-radius:30px;font-size:16px;font-weight:600;
  letter-spacing:.04em;cursor:pointer;font-family:inherit;
  border:none;transition:all .3s;
}
.btn-primary{background:#3D2C35;color:#FFFDF9}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}

.back-link{display:block;text-align:center;margin-top:24px;font-size:13px;color:#B098A3;text-decoration:none;letter-spacing:.04em}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#3D2C35;color:#fff;padding:12px 24px;border-radius:25px;
  font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}

@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:riseIn .6s ease forwards;opacity:0}
.anim.d1{animation-delay:.1s}.anim.d2{animation-delay:.2s}.anim.d3{animation-delay:.3s}
</style>
</head>

  <h1 class="title anim d2">选一个你喜欢的<br>日子见面吧</h1>
  <p class="subtitle anim d2">挑一天，我都会在</p>

  <div class="calendar anim d3" id="calendar"></div>

  <div class="selected-info anim d3" id="selectedInfo">
    <span class="si-emoji">📅</span>
    <div>
      <div class="si-date" id="selectedDate"></div>
      <div class="si-week" id="selectedWeek"></div>
    </div>
  </div>

  <button class="btn btn-primary anim d3" id="confirmBtn" disabled>确认这个日期 →</button>
  <a class="back-link" href="index.html">← 返回</a>

<div class="toast" id="toast"></div>

<script>
function T(m){
  var e=document.getElementById('toast');
  e.textContent=m;e.className='toast show';
  clearTimeout(e._t);e._t=setTimeout(function(){e.className='toast'},2000);
}

var selectedDay=null;
var now=new Date();
var currentMonth=now.getMonth();
var currentYear=now.getFullYear();
var weekFull=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function renderCalendar(){
  var firstDay=new Date(currentYear,currentMonth,1).getDay();
  var daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  var today=new Date();
  var todayStr=today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  var monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var weekNames=['日','一','二','三','四','五','六'];
  
  var html='<div class="cal-header">';
  html+='<button class="cal-nav" onclick="prevMonth()">&lt;</button>';
  html+='<span class="cal-month">'+currentYear+'年 '+monthNames[currentMonth]+'</span>';
  html+='<button class="cal-nav" onclick="nextMonth()">&gt;</button>';
  html+='</div>';
  
  html+='<div class="cal-weekdays">';
  weekNames.forEach(function(w){
    html+='<span style="'+(w==='日'||w==='六'?'color:#E0709F':'')+'">'+w+'</span>';
  });
  html+='</div>';
  
  html+='<div class="cal-days">';
  for(var i=0;i<firstDay;i++){html+='<div class="cal-day empty"></div>'}
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=currentYear+'-'+(currentMonth+1)+'-'+(d<10?'0'+d:d);
    var dayOfWeek=new Date(currentYear,currentMonth,d).getDay();
    var cls='cal-day';
    var checkDate=new Date(currentYear,currentMonth,d);
    var checkToday=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    if(checkDate<checkToday){cls+=' past'}
    if(dateStr===todayStr)cls+=' today';
    if(dayOfWeek===0||dayOfWeek===6)cls+=' weekend';
    if(selectedDay===dateStr)cls+=' selected';
    html+='<div class="'+cls+'" '+(checkDate<checkToday?'':'onclick="selectDay(\''+dateStr+'\','+dayOfWeek+')"')+'>'+d+'</div>';
  }
  html+='</div>';
  document.getElementById('calendar').innerHTML=html;
}

function selectDay(dateStr,dayOfWeek){
  selectedDay=dateStr;
  renderCalendar();
  document.getElementById('selectedDate').textContent=dateStr;
  document.getElementById('selectedWeek').textContent=weekFull[dayOfWeek];
  document.getElementById('selectedInfo').classList.add('show');
  document.getElementById('confirmBtn').disabled=false;
}

function prevMonth(){
  currentMonth--;
  if(currentMonth<0){currentMonth=11;currentYear--}
  renderCalendar();
}
function nextMonth(){
  currentMonth++;
  if(currentMonth>11){currentMonth=0;currentYear++}
  renderCalendar();
}

document.getElementById('confirmBtn').onclick=function(){
  if(!selectedDay)return;
  localStorage.setItem('di_selected_date',selectedDay);
  window.location.href='food.html';
};

renderCalendar();
</script>
</body>
</html>
