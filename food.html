<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>想吃点什么</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#FFFDF9;color:#3D2C35;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:30px 20px 50px;overflow-x:hidden;
}
.container{width:100%;max-width:400px}

/* 双女孩牵手（全新姿势） */
.girls-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:0;margin-bottom:24px;
}
.girls-row svg{width:240px;height:auto}

.title{
  font-size:26px;font-weight:800;color:#3D2C35;text-align:center;
  line-height:1.3;margin-bottom:6px;
}
.subtitle{font-size:14px;color:#9B8893;text-align:center;margin-bottom:24px}

/* 食物网格 */
.food-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-bottom:24px;
}
.food-item{
  background:#fff;border-radius:20px;padding:18px 8px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .25s;border:2px solid transparent;
  box-shadow:0 2px 12px rgba(0,0,0,.04);position:relative;
}
.food-item:active{transform:scale(.94)}
.food-item.selected{
  border-color:#3D2C35;background:#F8F6F3;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}
.food-item .check{
  position:absolute;top:8px;right:8px;width:22px;height:22px;
  border-radius:50%;background:#3D2C35;color:#fff;font-size:12px;
  display:none;align-items:center;justify-content:center;
}
.food-item.selected .check{display:flex}

.food-emoji{
  font-size:38px;line-height:1;transition:transform .3s;
  animation:none;
}
.food-item:hover .food-emoji{animation:bounce .5s ease}
.food-item.selected .food-emoji{animation:bounce .5s ease}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  30%{transform:translateY(-12px) rotate(-5deg)}
  50%{transform:translateY(0) rotate(3deg)}
  70%{transform:translateY(-6px)}
}

.food-label{font-size:13px;font-weight:600;color:#3D2C35;text-align:center}

/* 确认按钮 */
.btn{
  display:flex;align-items:center;justify-content:center;width:100%;
  padding:16px;border-radius:30px;font-size:16px;font-weight:600;
  letter-spacing:.04em;cursor:pointer;font-family:inherit;
  border:none;transition:all .3s;
}
.btn-primary{
  background:#3D2C35;color:#FFFDF9;
}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}

.back-link{
  display:block;text-align:center;margin-top:24px;font-size:13px;
  color:#B098A3;text-decoration:none;letter-spacing:.04em;
}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#3D2C35;color:#fff;padding:12px 24px;border-radius:25px;
  font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;
  pointer-events:none;
}
.toast.show{opacity:1}

/* 庆祝弹窗 */
.cel{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .5s;
}
.cel.show{opacity:1}
.cel-inner{
  text-align:center;color:#fff;padding:20px;
  background:rgba(255,255,255,.1);border-radius:30px;
  backdrop-filter:blur(10px);
}
.cel-inner .ce{font-size:72px;display:block;animation:pop .6s ease}
.cel-inner .ct{font-size:24px;font-weight:700;margin-top:16px;letter-spacing:.04em}
.cel-inner .cs{font-size:14px;margin-top:8px;opacity:.85}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:riseIn .6s ease forwards;opacity:0}
.anim.d1{animation-delay:.1s}.anim.d2{animation-delay:.2s}.anim.d3{animation-delay:.3s}.anim.d4{animation-delay:.4s}
</style>
</head>
<body>

<div class="container">
  <!-- 双女孩牵手（全新姿势：并肩站，手拉手举高） -->

        <rect x="20" y="85" width="10" height="10"/><rect x="30" y="85" width="10" height="10"/><rect x="40" y="85" width="10" height="10"/><rect x="50" y="85" width="10" height="10"/><rect x="60" y="85" width="10" height="10"/><rect x="70" y="85" width="10" height="10"/>

      </g>
      <g fill="#3D2C35"><rect x="26" y="115" width="16" height="6"/><rect x="46" y="115" width="16" height="6"/></g>
      <!-- 左臂下垂 -->
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
        <rect x="10" y="65" width="10" height="10"/><rect x="10" y="75" width="10" height="10"/>
      </g>
      <!-- 右臂（牵手举高） -->
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
        <rect x="80" y="50" width="10" height="10"/>

      </g>

      <!-- 右边女孩（黑发，蓝色上衣+黄裙） -->
      <g fill="#2D2D2D" stroke="#3D2C35" stroke-width="1">
        <rect x="130" y="15" width="10" height="10"/><rect x="140" y="15" width="10" height="10"/><rect x="150" y="15" width="10" height="10"/><rect x="160" y="15" width="10" height="10"/>
        <rect x="120" y="25" width="10" height="10"/><rect x="130" y="25" width="10" height="10"/><rect x="140" y="25" width="10" height="10"/><rect x="150" y="25" width="10" height="10"/><rect x="160" y="25" width="10" height="10"/><rect x="170" y="25" width="10" height="10"/>
        <rect x="120" y="35" width="10" height="10"/><rect x="170" y="35" width="10" height="10"/>
        <rect x="120" y="45" width="10" height="10"/><rect x="170" y="45" width="10" height="10"/>
        <rect x="120" y="55" width="10" height="10"/><rect x="170" y="55" width="10" height="10"/>
      </g>
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">

        <rect x="130" y="45" width="10" height="10"/><rect x="140" y="45" width="10" height="10"/><rect x="150" y="45" width="10" height="10"/><rect x="160" y="45" width="10" height="10"/>
      </g>
      <g fill="#3D2C35"><rect x="136" y="41" width="4" height="4"/><rect x="156" y="41" width="4" height="4"/></g>
      <g fill="#FFB3B3" opacity="0.5"><rect x="128" y="48" width="6" height="3"/><rect x="164" y="48" width="6" height="3"/></g>

      </g>

      <g fill="#F5C842" stroke="#3D2C35" stroke-width="1">

        <rect x="120" y="85" width="10" height="10"/><rect x="130" y="85" width="10" height="10"/><rect x="140" y="85" width="10" height="10"/><rect x="150" y="85" width="10" height="10"/><rect x="160" y="85" width="10" height="10"/><rect x="170" y="85" width="10" height="10"/>
      </g>
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">

      </g>
      <g fill="#3D2C35"><rect x="126" y="115" width="16" height="6"/><rect x="146" y="115" width="16" height="6"/></g>
      <!-- 左臂（牵手举高） -->
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
        <rect x="110" y="40" width="10" height="10"/>
        <rect x="100" y="50" width="10" height="10"/>
      </g>
      <!-- 右臂下垂 -->
      <g fill="#FFE4C4" stroke="#3D2C35" stroke-width="1">
        <rect x="180" y="65" width="10" height="10"/><rect x="180" y="75" width="10" height="10"/>
      </g>

      <!-- 牵手处爱心 -->
      <rect x="95" y="35" width="8" height="8" fill="#FF6B88" stroke="#3D2C35" stroke-width="0.5"/>

  <h1 class="title anim d2">想吃点什么？</h1>
  <p class="subtitle anim d2">选一个最想吃的吧～</p>

  <!-- 食物选择 -->
  <div class="food-grid anim d3" id="foodGrid">
    <div class="food-item" data-food="火锅" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍲</div>
      <div class="food-label">火锅</div>
    </div>
    <div class="food-item" data-food="日料" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍣</div>
      <div class="food-label">日料</div>
    </div>
    <div class="food-item" data-food="烤肉" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🥩</div>
      <div class="food-label">烤肉</div>
    </div>
    <div class="food-item" data-food="西餐" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍝</div>
      <div class="food-label">西餐</div>
    </div>
    <div class="food-item" data-food="甜品" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍰</div>
      <div class="food-label">甜品</div>
    </div>
    <div class="food-item" data-food="咖啡" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">☕</div>
      <div class="food-label">咖啡</div>
    </div>
    <div class="food-item" data-food="奶茶" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🧋</div>
      <div class="food-label">奶茶</div>
    </div>
    <div class="food-item" data-food="冰淇淋" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍦</div>
      <div class="food-label">冰淇淋</div>
    </div>
    <div class="food-item" data-food="小吃" onclick="selectFood(this)">
      <div class="check">✓</div>
      <div class="food-emoji">🍟</div>
      <div class="food-label">小吃</div>
    </div>
  </div>

  <button class="btn btn-primary anim d4" id="confirmBtn" disabled>选好了 →</button>
  <a class="back-link" href="date.html">← 返回</a>
</div>

<div class="toast" id="toast"></div>

<!-- 庆祝弹窗 -->
<div class="cel" id="cel">
  <div class="cel-inner">
    <span class="ce">💖</span>
    <div class="ct">那就说好了！</div>
    <div class="cs">日期和美食都选好啦～等你哦</div>
  </div>
</div>

<script>
var API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8765'
  : 'https://603619858-ui.github.io/date-invite';

function getInviteId(){
  var p = new URLSearchParams(window.location.search);
  return p.get('id');
}

var selectedFood=null;

function T(m){
  var e=document.getElementById('toast');
  e.textContent=m;e.className='toast show';
  clearTimeout(e._t);e._t=setTimeout(function(){e.className='toast'},2000);
}

function selectFood(el){
  document.querySelectorAll('.food-item').forEach(function(f){f.classList.remove('selected')});
  el.classList.add('selected');
  selectedFood=el.dataset.food;
  document.getElementById('confirmBtn').disabled=false;
  document.getElementById('confirmBtn').textContent='吃 '+selectedFood+' →';
}

document.getElementById('confirmBtn').onclick=function(){
  if(!selectedFood)return T('请先选择想吃的');
  localStorage.setItem('di_selected_food',selectedFood);
  // 同步到后端
  var inviteId=getInviteId();
  if(inviteId){
    fetch(API_BASE+'/api/pick-food',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:inviteId,food:selectedFood})
    }).catch(function(){});
  }
  document.getElementById('cel').classList.add('show');
};
</script>
</body>
</html>
