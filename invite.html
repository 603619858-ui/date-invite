<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💖 给你的小邀请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#FFF8F5 0%,#FFEDE8 50%,#FFEBF2 100%);
  min-height:100vh;min-height:100dvh;color:#3D2C35;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* 顶部进度条 */
.progress-bar{
  position:fixed;top:0;left:0;right:0;display:flex;
  justify-content:flex-end;gap:6px;padding:16px 20px;z-index:50;
}
.progress-dot{
  height:4px;border-radius:2px;background:#E5D0D5;
  transition:all .4s ease;
  min-width:24px;
}
.progress-dot.active{background:#E0709F;min-width:32px}
.progress-dot.done{background:#F0A8C0}

/* 步骤容器 */
.step{
  position:absolute;top:0;left:0;width:100%;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:60px 28px 40px;opacity:0;
  pointer-events:none;transition:opacity .5s,transform .5s;
  transform:translateX(40px);
}
.step.show{opacity:1;pointer-events:auto;transform:translateX(0)}
.step.prev{transform:translateX(-40px)}

/* 内容 */
.step-content{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;width:100%;max-width:400px;text-align:center;
}
.english-label{
  font-size:11px;color:#B098A3;letter-spacing:.18em;margin-bottom:16px;
  text-transform:uppercase;font-weight:600;
}
.chinese-title{
  font-size:32px;font-weight:800;color:#3D2C35;line-height:1.3;
  margin-bottom:8px;letter-spacing:.01em;
}
.chinese-sub{
  font-size:15px;color:#9B8893;letter-spacing:.04em;margin-bottom:40px;
}

/* 像素心形SVG容器 */
.pixel-art{
  width:280px;height:240px;margin:20px auto 30px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.pixel-art svg{width:100%;height:100%}

/* 装饰小图标 */
.decor-icons{position:absolute;pointer-events:none;z-index:1}
.decor-icons span{position:absolute;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.2)}
}

/* 选项卡片 */
.options{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;
  margin-bottom:24px;
}
.option{
  background:#fff;border-radius:20px;padding:18px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .3s;border:2px solid transparent;
  box-shadow:0 2px 12px rgba(225,200,210,.2);
}
.option:active{transform:scale(.96)}
.option.selected{border-color:#E0709F;background:#FFF0F5}
.option .opt-emoji{font-size:38px;line-height:1}
.option .opt-label{font-size:14px;font-weight:600;color:#3D2C35}

/* 翻页按钮 */
.nav-buttons{
  display:flex;justify-content:center;gap:12px;width:100%;
  margin-top:auto;padding-top:20px;
}
.btn{
  padding:16px 36px;border-radius:30px;font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;border:none;transition:all .3s;
  display:inline-flex;align-items:center;gap:6px;letter-spacing:.04em;
}
.btn-primary{
  background:linear-gradient(135deg,#E89BB8,#E0709F);
  color:#fff;box-shadow:0 6px 20px rgba(224,112,159,.3);
}
.btn-primary:active{transform:scale(.96)}
.btn-ghost{
  background:transparent;border:1px solid #DDD;color:#9B8893;
}
.btn-ghost:active{transform:scale(.96)}

/* 第3步 - 时间段选择 */
.time-options{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;
  margin-bottom:30px;
}
.time-card{
  background:#fff;border-radius:20px;padding:24px 12px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:all .3s;border:2px solid transparent;
  position:relative;
  box-shadow:0 2px 12px rgba(225,200,210,.15);
}
.time-card.selected{border-color:#E0709F;background:#FFF0F5}
.time-card .check{
  position:absolute;top:10px;right:10px;width:24px;height:24px;
  border-radius:50%;background:#E0709F;display:none;
  align-items:center;justify-content:center;color:#fff;font-size:12px;
}
.time-card.selected .check{display:flex}
.time-card .t-emoji{font-size:32px}
.time-card .t-label{font-size:15px;font-weight:700;color:#3D2C35}

/* 留言 */
.msg-area{
  width:100%;background:#fff;border-radius:18px;padding:14px 18px;
  margin-bottom:12px;min-height:60px;
  box-shadow:0 2px 12px rgba(225,200,210,.15);
}
.msg-area:focus{outline:none}
.msg-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.suggestion{
  padding:7px 14px;background:#fff;border-radius:18px;font-size:13px;
  color:#9B8893;cursor:pointer;border:1px solid #F0E0E5;
  transition:all .2s;
}
.suggestion:active{background:#FFE8F0;color:#E0709F}

/* 庆祝 */
.celebrate{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
.celebrate.show{opacity:1}
.celebrate-inner{text-align:center;color:#fff;padding:20px}
.celebrate-inner .c-emoji{font-size:72px;display:block;animation:pop .6s ease}
.celebrate-inner .c-text{font-size:22px;font-weight:700;margin-top:16px;letter-spacing:.04em}
.celebrate-inner .c-sub{font-size:14px;margin-top:8px;opacity:.85}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* 错误 */
.err-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.err-page h2{font-size:18px;margin-bottom:8px;color:#3D2C35}
.err-page p{font-size:14px;color:#9B8893;margin-bottom:24px}
.err-page a{padding:12px 32px;background:#3D2C35;color:#fff;border-radius:25px;text-decoration:none;font-size:14px}
</style>
</head>
<body>

<!-- 进度条 -->
<div class="progress-bar" id="progBar">
  <span class="progress-dot active"></span>
  <span class="progress-dot"></span>
  <span class="progress-dot"></span>
  <span class="progress-dot"></span>
</div>

<!-- 步骤1: 开场 -->
<div class="step show" data-step="0">
  <div class="step-content">
    <div class="english-label">A LITTLE SOMETHING</div>
    <div class="chinese-title" id="st1Title">想给你一个<br>甜甜的邀约</div>
    <div class="chinese-sub" id="st1Sub">你准备好接收了吗？</div>
    <div class="pixel-art">
      <span class="decor-icons"><span style="top:5%;left:5%;color:#FFD700;font-size:14px">✦</span><span style="top:5%;right:8%;color:#E0709F;font-size:12px">♥</span><span style="bottom:8%;left:5%;color:#FFA0C0;font-size:10px">✧</span></span>
      <!-- 像素信封 -->
      <svg viewBox="0 0 220 180" fill="none">
        <!-- 信封主体 -->
        <g>
          <rect x="20" y="60" width="180" height="100" fill="#FFE0D8" stroke="#C08890" stroke-width="2"/>
          <rect x="20" y="60" width="180" height="100" fill="none" stroke="#3D2C35" stroke-width="1.5" stroke-dasharray="4,3"/>
          <!-- 信封三角 -->
          <path d="M20 60 L110 130 L200 60" fill="#FFD4C8" stroke="#3D2C35" stroke-width="2"/>
          <path d="M20 60 L110 130 L200 60" stroke="#C08890" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>
          <!-- 像素心形 -->
          <g transform="translate(70, 95)">
            <rect x="0" y="10" width="10" height="10" fill="#FF6B88"/>
            <rect x="10" y="0" width="10" height="10" fill="#FF6B88"/>
            <rect x="20" y="0" width="10" height="10" fill="#FF6B88"/>
            <rect x="30" y="0" width="10" height="10" fill="#FF6B88"/>
            <rect x="40" y="10" width="10" height="10" fill="#FF6B88"/>
            <rect x="0" y="20" width="10" height="10" fill="#FF6B88"/>
            <rect x="10" y="10" width="10" height="10" fill="#FF8FAB"/>
            <rect x="20" y="10" width="10" height="10" fill="#FF8FAB"/>
            <rect x="30" y="10" width="10" height="10" fill="#FF8FAB"/>
            <rect x="40" y="20" width="10" height="10" fill="#FF6B88"/>
            <rect x="0" y="30" width="10" height="10" fill="#FF6B88"/>
            <rect x="10" y="20" width="10" height="10" fill="#FF8FAB"/>
            <rect x="20" y="20" width="10" height="10" fill="#FFB3C8"/>
            <rect x="30" y="20" width="10" height="10" fill="#FF8FAB"/>
            <rect x="40" y="30" width="10" height="10" fill="#FF6B88"/>
            <rect x="0" y="40" width="10" height="10" fill="#FF6B88"/>
            <rect x="10" y="30" width="10" height="10" fill="#FF6B88"/>
            <rect x="20" y="30" width="10" height="10" fill="#FF6B88"/>
            <rect x="30" y="30" width="10" height="10" fill="#FF6B88"/>
            <rect x="40" y="40" width="10" height="10" fill="#FF6B88"/>
            <rect x="10" y="40" width="10" height="10" fill="#FF6B88"/>
            <rect x="20" y="40" width="10" height="10" fill="#FF6B88"/>
            <rect x="30" y="40" width="10" height="10" fill="#FF6B88"/>
          </g>
        </g>
      </svg>
    </div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-primary" onclick="nextStep()">轻触打开 →</button>
  </div>
</div>

<!-- 步骤2: 问候 -->
<div class="step" data-step="1">
  <div class="step-content">
    <div class="english-label">A LITTLE SOMETHING</div>
    <div class="chinese-title">来自一个<br><span style="color:#E0709F">很在意你的人。</span></div>
    <div class="chinese-sub" id="st2Sub">TA 想认真约你一次 🌸</div>
    <div class="pixel-art">
      <span class="decor-icons"><span style="top:5%;left:5%;font-size:14px">💌</span><span style="top:10%;right:8%;font-size:18px">🦋</span><span style="bottom:5%;left:10%;font-size:12px">✨</span></span>
      <svg viewBox="0 0 220 200" fill="none">
        <!-- 对话框 -->
        <g>
          <path d="M30 50 Q30 30 50 30 L170 30 Q190 30 190 50 L190 130 Q190 150 170 150 L80 150 L60 175 L65 150 L50 150 Q30 150 30 130 Z" fill="#FFE8E0" stroke="#3D2C35" stroke-width="2"/>
          <path d="M30 50 Q30 30 50 30 L170 30 Q190 30 190 50 L190 130 Q190 150 170 150 L80 150 L60 175 L65 150 L50 150 Q30 150 30 130 Z" stroke="#C08890" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
          <!-- 内部像素心 -->
          <g transform="translate(70, 65)">
            <rect x="0" y="10" width="10" height="10" fill="#FF8FAB"/>
            <rect x="10" y="0" width="10" height="10" fill="#FF8FAB"/>
            <rect x="20" y="0" width="10" height="10" fill="#FF8FAB"/>
            <rect x="30" y="0" width="10" height="10" fill="#FF8FAB"/>
            <rect x="40" y="10" width="10" height="10" fill="#FF8FAB"/>
            <rect x="0" y="20" width="10" height="10" fill="#FF8FAB"/>
            <rect x="10" y="10" width="10" height="10" fill="#FFB3C8"/>
            <rect x="20" y="10" width="10" height="10" fill="#FFB3C8"/>
            <rect x="30" y="10" width="10" height="10" fill="#FFB3C8"/>
            <rect x="40" y="20" width="10" height="10" fill="#FF8FAB"/>
            <rect x="10" y="20" width="10" height="10" fill="#FFB3C8"/>
            <rect x="20" y="20" width="10" height="10" fill="#FFD4DE"/>
            <rect x="30" y="20" width="10" height="10" fill="#FFB3C8"/>
            <rect x="10" y="30" width="10" height="10" fill="#FF8FAB"/>
            <rect x="20" y="30" width="10" height="10" fill="#FF8FAB"/>
            <rect x="30" y="30" width="10" height="10" fill="#FF8FAB"/>
          </g>
        </g>
      </svg>
    </div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-primary" onclick="nextStep()">继续 →</button>
  </div>
</div>

<!-- 步骤3: 邀请详情 -->
<div class="step" data-step="2">
  <div class="step-content">
    <div class="english-label">A LITTLE INVITATION</div>
    <div class="chinese-title" id="st3Title">一起吃顿<br>好吃的吧？</div>
    <div class="chinese-sub" id="st3Sub">这是为你准备的小心意</div>
    <div style="width:100%;background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(225,200,210,.2)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:20px">📅</span>
        <span style="font-size:15px;font-weight:700" id="dDate">2025-08-20</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:20px">⏰</span>
        <span style="font-size:15px;font-weight:700" id="dTime">18:00</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">📍</span>
        <span style="font-size:15px;font-weight:700" id="dLocation">山谷图书馆</span>
      </div>
    </div>
    <div id="dMessage" style="font-size:13px;color:#9B8893;font-style:italic;line-height:1.6;max-width:280px"></div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-ghost" onclick="prevStep()">←</button>
    <button class="btn btn-primary" onclick="nextStep()">看看详情 →</button>
  </div>
</div>

<!-- 步骤4: 选择时间 -->
<div class="step" data-step="3">
  <div class="step-content">
    <div class="chinese-title" style="font-size:28px">什么时候最合适？</div>
    <div class="chinese-sub" id="st4Sub">挑一个时间吧～</div>
    <div class="time-options">
      <div class="time-card" data-time="保持原定时间" onclick="selectTime(this)">
        <div class="check">✓</div>
        <div class="t-emoji">🌙</div>
        <div class="t-label" id="tOpt1">原定时间</div>
      </div>
      <div class="time-card" data-time="明天" onclick="selectTime(this)">
        <div class="check">✓</div>
        <div class="t-emoji">🌅</div>
        <div class="t-label">明天</div>
      </div>
      <div class="time-card" data-time="这周末" onclick="selectTime(this)">
        <div class="check">✓</div>
        <div class="t-emoji">📅</div>
        <div class="t-label">这周末</div>
      </div>
      <div class="time-card" data-time="下周" onclick="selectTime(this)">
        <div class="check">✓</div>
        <div class="t-emoji">🗓️</div>
        <div class="t-label">下周</div>
      </div>
    </div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-ghost" onclick="prevStep()">←</button>
    <button class="btn btn-primary" onclick="nextStep()" id="goStep5">送出回应 →</button>
  </div>
</div>

<!-- 步骤5: 留言并提交 -->
<div class="step" data-step="4">
  <div class="step-content">
    <div class="chinese-title" style="font-size:26px">想对TA说点什么？</div>
    <div class="chinese-sub" id="st5Sub">（可选）</div>
    <textarea class="msg-area" id="userMsg" placeholder="写下你的心意..." maxlength="200"></textarea>
    <div class="msg-suggestions">
      <span class="suggestion" onclick="useSug(this)">好呀！期待</span>
      <span class="suggestion" onclick="useSug(this)">等我！</span>
      <span class="suggestion" onclick="useSug(this)">必须答应</span>
      <span class="suggestion" onclick="useSug(this)">让我看看时间</span>
    </div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-ghost" onclick="prevStep()">←</button>
    <button class="btn btn-primary" onclick="submit()" id="finalBtn">确认回应 →</button>
  </div>
</div>

<!-- 庆祝 -->
<div class="celebrate" id="cel">
  <div class="celebrate-inner">
    <span class="c-emoji">💖</span>
    <div class="c-text">那就说好了！</div>
    <div class="c-sub" id="celSub">回应已发送给TA啦</div>
  </div>
</div>

<!-- 错误页 -->
<div class="err-page" id="err" style="display:none">
  <h2>😢 邀请不存在</h2>
  <p>这个邀请链接可能已经失效</p>
  <a href="index.html">返回首页</a>
</div>

<script>
var currentStep=0;
var selectedTime='';
var userMsg='';
var inv=null;

function E(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// 初始化
var id=(new URLSearchParams(window.location.search)).get('id');
if(!id){document.getElementById('err').style.display='flex';document.body.style.overflow='hidden'}
var db=JSON.parse(localStorage.getItem('di_db')||'{}');
inv=db[id];
if(!inv){document.getElementById('err').style.display='flex';document.body.style.overflow='hidden'}else{
  if(!inv.openedAt){inv.openedAt=new Date().toLocaleString('zh-CN');inv.status='opened';localStorage.setItem('di_db',JSON.stringify(db))}
  
  // 填充数据
  document.getElementById('dDate').textContent=inv.date;
  document.getElementById('dTime').textContent=inv.time;
  document.getElementById('dLocation').textContent=inv.location;
  if(inv.message)document.getElementById('dMessage').textContent='"'+inv.message+'"';
  if(inv.title)document.getElementById('st3Title').innerHTML=inv.title.replace(/\n/g,'<br>');
  if(inv.nickname)document.getElementById('st2Sub').textContent='TA 想认真邀请 '+inv.nickname+' 🌸';
  document.getElementById('tOpt1').textContent=inv.date+' '+inv.time;
}

function showStep(n){
  if(inv&&inv.respType){
    // 已经回应过
    if(inv.respType==='accept'){
      showCel('💖', '已经说好了！', '你之前已接受邀请');
    } else {
      showCel('🕐', '已申请改期', '你之前已申请改期');
    }
    return;
  }
  
  var steps=document.querySelectorAll('.step');
  steps.forEach(function(s,i){
    s.classList.remove('show','prev');
    if(i===n)s.classList.add('show');
    else if(i<n)s.classList.add('prev');
  });
  
  // 更新进度
  var dots=document.querySelectorAll('.progress-dot');
  dots.forEach(function(d,i){
    d.classList.remove('active','done');
    if(i===n)d.classList.add('active');
    else if(i<n)d.classList.add('done');
  });
  
  currentStep=n;
}

function nextStep(){
  if(currentStep<4)showStep(currentStep+1);
}
function prevStep(){
  if(currentStep>0)showStep(currentStep-1);
}

function selectTime(el){
  document.querySelectorAll('.time-card').forEach(function(c){c.classList.remove('selected')});
  el.classList.add('selected');
  selectedTime=el.dataset.time;
}

function useSug(el){
  document.getElementById('userMsg').value=el.textContent;
}

function submit(){
  userMsg=document.getElementById('userMsg').value.trim();
  if(!selectedTime){alert('请选择一个时间');return}
  
  inv.respType='accept';
  inv.status='accepted';
  inv.respondedAt=new Date().toLocaleString('zh-CN');
  inv.userTime=selectedTime;
  inv.userMsg=userMsg;
  localStorage.setItem('di_db',JSON.stringify(db));
  
  showCel('💖','那就说好了！','TA 收到你的回应啦');
}

function showCel(emoji,text,sub){
  document.querySelector('.c-emoji').textContent=emoji;
  document.querySelector('.c-text').textContent=text;
  document.getElementById('celSub').textContent=sub;
  document.getElementById('cel').classList.add('show');
}

showStep(0);
</script>
</body>
</html>
